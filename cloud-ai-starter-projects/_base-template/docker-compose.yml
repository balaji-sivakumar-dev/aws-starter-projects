services:

  # ── DynamoDB local ──────────────────────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}-dynamodb
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8000 && echo -e 'GET / HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'HTTP'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Python FastAPI ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-app}-api
    environment:
      APP_ENV: local
      TABLE_NAME: ${TABLE_NAME:-{{APP_PREFIX}}}
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "8080:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    restart: on-failure

  # ── React + Nginx ───────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_AUTH_MODE: local
        VITE_LOCAL_USER_ID: dev-user
        VITE_APP_NAME: ${APP_TITLE:-{{APP_TITLE}}}
    container_name: ${COMPOSE_PROJECT_NAME:-app}-web
    ports:
      - "3000:80"
    depends_on:
      - api
